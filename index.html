<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎉 مفاجأة 🎉</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
background: linear-gradient(-45deg,#ff4e8a,#6a5acd,#ff9a9e,#fad0c4);
background-size:400% 400%;
animation:bgMove 12s ease infinite;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
text-align:center;
background:rgba(0,0,0,0.65);
padding:40px;
border-radius:25px;
box-shadow:0 0 60px rgba(255,105,180,0.9);
backdrop-filter:blur(15px);
width:90%;
max-width:600px;
}

h1{
color:white;
margin-bottom:20px;
font-size:26px;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{text-shadow:0 0 10px #ff69b4;}
to{text-shadow:0 0 40px #ff1493;}
}

input{
padding:12px;
border:none;
border-radius:20px;
text-align:center;
font-size:18px;
outline:none;
}

button{
margin-top:15px;
padding:10px 25px;
border:none;
border-radius:20px;
background:#ff1493;
color:white;
font-size:18px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
box-shadow:0 0 20px #ff1493;
}

#message{
display:none;
margin-top:25px;
color:white;
white-space:pre-line;
font-size:18px;
border-right:3px solid white;
overflow:hidden;
}

.cursor{
display:inline-block;
width:3px;
background:white;
animation:blink 0.7s infinite;
}

@keyframes blink{
0%,50%,100%{opacity:1;}
25%,75%{opacity:0;}
}

.heart{
position:absolute;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh) scale(1);}
100%{transform:translateY(-10vh) scale(1.6);}
}
</style>
</head>

<body>

<div class="container">
<h1>كل سنه ونتي طيبه يا ثمكه💗❤</h1>
<input type="password" id="pass" placeholder="اكتبي الباسورد">
<br>
<button onclick="checkPass()">دخول</button>

<div id="message"></div>
</div>

<audio id="song" src="Albumaty.Com_bhaa_sltan_ydwm_alaman.mp3"></audio>

<script>

const text = `كل سنه ونتي طيبه يا ثمكه 
كل سنه ونتي احسن اخت 
كل سنه وانتي احسن بنت خالتي في الدنيا 
كل سنه ونتي طيبه يا ثمكههههه🙂🫶
منوره يا ثمكه🙂🫶
نسيت بقي اجبلك هديه معلش🙂🫶 
هبقا اجبلك هديه صغيره🙂 ويارب تقبليها مني 🙂🫶 
معلش بقي انا اصول ابعت الرساله امبارح الساعه 12بس معلش بقي كنت بعمل في الموقع فغصب عني 
وانا منسيتش عيد ميلادك ولا حاجه انا اللي م عايز اقولك ع الواتس كل سنه ونتي طيبه كدا 
لازما اعملك حاجه عشان انتي غاليه عندي فالموقع دا هديه بسيطه غير الهديه اللي هجبهالك🙂🫶🫶🫶 اخر حاجه كل سنه وانتي طيبه 
بس كدا باي🙂🫶💗`;

function typeWriter(text, element, speed){
let i = 0;
element.innerHTML = "";
function typing(){
if(i < text.length){
element.innerHTML += text.charAt(i);
i++;
setTimeout(typing, speed);
}
}
typing();
}

function checkPass(){
let pass = document.getElementById("pass").value;
if(pass === "ثمكه"){
document.getElementById("message").style.display="block";
document.getElementById("song").play();
typeWriter(text, document.getElementById("message"), 35);
}else{
alert("غلط يا ثمكه 🙂");
}
}

setInterval(()=>{
let heart = document.createElement("div");
heart.className="heart";
heart.innerHTML="💗";
heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=Math.random()*20+20+"px";
document.body.appendChild(heart);
setTimeout(()=>{heart.remove();},6000);
},500);

</script>

</body>
  </html>
